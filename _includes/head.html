<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {%- if page.url == '/' -%}
    {%- assign full_title = site.title -%}
  {%- else -%}
    {%- assign full_title = page.title | append: ' · ' | append: site.title -%}
  {%- endif -%}
  {%- assign meta_desc = page.description | default: site.description | strip_newlines | strip -%}

  <title>{{ full_title }}</title>
  <meta name="description" content="{{ meta_desc }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <meta name="author" content="{{ site.author }}">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:title" content="{{ full_title }}">
  <meta property="og:description" content="{{ meta_desc }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ page.image | default: '/assets/img/meta/og-image.jpg' | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ full_title }}">
  <meta name="twitter:description" content="{{ meta_desc }}">
  <meta name="twitter:image" content="{{ page.image | default: '/assets/img/meta/og-image.jpg' | absolute_url }}">

  <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">

  <link rel="preload" href="{{ '/assets/fonts/poppins/poppins-400.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="{{ '/assets/fonts/poppins/poppins-500.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Cecile Pearson",
    "jobTitle": "Painter",
    "url": "{{ '/' | absolute_url }}",
    "image": "{{ '/assets/img/meta/og-image.jpg' | absolute_url }}",
    "sameAs": ["{{ site.instagram_url }}"],
    "email": "mailto:{{ site.email }}",
    "homeLocation": { "@type": "Place", "name": "Los Angeles, California" }
  }
  </script>
</head>
